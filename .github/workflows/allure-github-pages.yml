# On every push to main, runs Playwright E2E tests, builds an Allure report,
# and deploys it to GitHub Pages.
#
# One-time GitHub setup:
# 1. Settings → Pages → Build and deployment → Source: "GitHub Actions"
# 2. Settings → Secrets and variables → Actions → Variables:
#    Add E2E_BASE_URL = your deployed app URL (tests run on GitHub runners, not localhost)

name: Allure report to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissio
ns:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: allure-github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-allure:
    name: Tests and Allure report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright-automation/package-lock.json

      - name: Install dependencies
        working-directory: playwright-automation
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright-automation
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        working-directory: playwright-automation
        env:
          CI: true
          BASE_URL: ${{ vars.E2E_BASE_URL }}
        continue-on-error: true
        run: npx playwright test

      - name: Generate Allure report
        if: always()
        working-directory: playwright-automation
        run: npx allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-automation/allure-report

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build-allure
    if: needs.build-allure.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

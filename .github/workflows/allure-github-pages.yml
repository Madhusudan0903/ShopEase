name: Allure Report (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright-automation/package-lock.json

      - name: Install dependencies
        working-directory: playwright-automation
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright-automation
        run: npx playwright install --with-deps

      - name: Run Playwright tests (generates allure-results)
        working-directory: playwright-automation
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
        continue-on-error: true
        run: npm test

      - name: Setup Java (required by Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate Allure HTML report
        if: always()
        working-directory: playwright-automation
        shell: bash
        run: |
          if [ -d "allure-results" ]; then
            npx allure generate ./allure-results -o ./allure-report --clean
          else
            mkdir -p ./allure-report
            cat > ./allure-report/index.html <<'EOF'
            <!doctype html>
            <html>
              <head>
                <meta charset="utf-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1" />
                <title>Allure report not generated</title>
              </head>
              <body style="font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 24px;">
                <h1>Allure report not generated</h1>
                <p>No <code>allure-results</code> directory was found, so an Allure report could not be generated.</p>
                <p>Check the workflow logs for Playwright test output.</p>
              </body>
            </html>
            EOF
          fi

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (Allure report)
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-automation/allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

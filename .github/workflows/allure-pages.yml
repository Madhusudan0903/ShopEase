name: Playwright Tests & Allure Report (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: allure-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: capstone_shopping
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: capstone_shopping
      PORT: 5000
      NODE_ENV: test
      CI: "true"
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            playwright-automation/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('playwright-automation/package-lock.json') }}

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install automation deps
        working-directory: playwright-automation
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright-automation
        run: npx playwright install --with-deps chromium

      - name: Init database (schema + seed)
        run: |
          mysql -h 127.0.0.1 -P 3306 -u "${DB_USER}" -p"${DB_PASSWORD}" -e "CREATE DATABASE IF NOT EXISTS ${DB_NAME} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h 127.0.0.1 -P 3306 -u "${DB_USER}" -p"${DB_PASSWORD}" "${DB_NAME}" < database/schema.sql
          mysql -h 127.0.0.1 -P 3306 -u "${DB_USER}" -p"${DB_PASSWORD}" "${DB_NAME}" < database/seed-data.sql

      - name: Start backend
        working-directory: backend
        run: |
          nohup npm run start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -s "http://localhost:5000/" >/dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time"
          echo "---- backend log ----"
          tail -n 200 /tmp/backend.log || true
          exit 1

      - name: Start frontend (Vite)
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 --port 3000 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for UI
        run: |
          for i in $(seq 1 60); do
            if curl -s "http://localhost:3000/login" >/dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend did not become ready in time"
          echo "---- backend log ----"
          tail -n 200 /tmp/backend.log || true
          echo "---- frontend log ----"
          tail -n 200 /tmp/frontend.log || true
          exit 1

      - name: Run Playwright tests
        working-directory: playwright-automation
        continue-on-error: true
        run: npx playwright test --project=chromium --workers=1

      - name: Generate Allure report
        if: always()
        working-directory: playwright-automation
        run: |
          mkdir -p ./allure-results
          npx allure generate ./allure-results --clean -o ./allure-report

      - name: Deploy to GitHub Pages (gh-pages)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-automation/allure-report
          publish_branch: gh-pages
          enable_jekyll: false
          force_orphan: true
          commit_message: "Update Allure report"
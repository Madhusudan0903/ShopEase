name: Playwright Tests (Allure → GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright-automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright-automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (with Allure)
        env:
          CI: "true"
          BASE_URL: ${{ vars.BASE_URL }}
        run: npx playwright test

      - name: Generate Allure HTML report
        if: always()
        run: npx allure generate ./allure-results --clean -o ./allure-report

      - name: Upload raw Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: playwright-automation/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Pages artifact (Allure report)
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-automation/allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4


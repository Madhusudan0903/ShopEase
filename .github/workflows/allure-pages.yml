# Builds the Allure report from Playwright results and publishes it to GitHub Pages.
#
# Setup (one-time):
# 1. Repo → Settings → Secrets and variables → Actions → add secret BASE_URL (your deployed app, e.g. https://example.com).
# 2. Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Allure report (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "playwright-automation/**"
      - ".github/workflows/allure-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    defaults:
      run:
        working-directory: playwright-automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright-automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Require BASE_URL
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::Add the repository secret BASE_URL with your deployed application URL (HTTPS). Localhost is not available in GitHub-hosted runners."
            exit 1
          fi

      - name: Run Playwright tests
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npx playwright test --project=chromium

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-automation/allure-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

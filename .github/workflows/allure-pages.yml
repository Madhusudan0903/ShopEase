name: Allure report to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
            playwright-automation/package-lock.json

      - name: Install dependencies (backend)
        working-directory: backend
        run: npm ci

      - name: Install dependencies (frontend)
        working-directory: frontend
        run: npm ci

      - name: Install dependencies (playwright)
        working-directory: playwright-automation
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright-automation
        run: npx playwright install --with-deps

      - name: Start backend
        working-directory: backend
        run: |
          npm start &

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host 127.0.0.1 --port 3000 &

      - name: Wait for app
        working-directory: playwright-automation
        run: npx wait-on@7.2.0 http://127.0.0.1:3000 -t 180000

      - name: Run Playwright tests (generate Allure results)
        working-directory: playwright-automation
        env:
          CI: true
          BASE_URL: http://127.0.0.1:3000
        run: npm test

      - name: Generate Allure HTML report
        if: always()
        working-directory: playwright-automation
        run: |
          npx allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-automation/allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
